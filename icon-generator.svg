      <rect x="-50" y="-35" width="40" height="20" fill="#1d4ed8" rx="4" ry="4"/>
      <rect x="10" y="-35" width="40" height="20" fill="#1d4ed8" rx="4" ry="4"/>
      <circle cx="-35" cy="15" r="12" fill="#1f2937"/>
      <circle cx="35" cy="15" r="12" fill="#1f2937"/>
      <circle cx="-35" cy="15" r="6" fill="#6b7280"/>
