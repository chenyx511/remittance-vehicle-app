# 推送到 main 分支时自动构建并部署到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # 允许在 GitHub 网页上手动点击 Run workflow 触发
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # 使用仓库名作为子路径，对应 https://<username>.github.io/<repo-name>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      # SPA 路由：刷新任意路径时由 404 页兜底到 index.html
      - name: Copy index to 404
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
